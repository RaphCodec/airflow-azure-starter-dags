site_name: "Airflow Azure Starter DAGs"
site_description: "Starter DAGs and example workflows for Airflow on Azure"
repo_url: "https://github.com/RaphCodec/airflow-azure-starter-dags"
docs_dir: src
theme:
  name: materialx
  logo: "🤖"
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra_css:
  - src/assets/theme.css
extra_javascript:
  - src/assets/theme.js
nav:
  - Home: index.md
  - Getting Started: getting-started.md
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite


