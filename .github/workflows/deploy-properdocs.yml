name: Deploy docs to gh-pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'docs/**'
      - 'docs/properdocs.yml'
      - 'docs/pyproject.toml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Install uv (astral) and enable cache
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.11.7'
          enable-cache: true

      - name: Install Python for the project (via uv)
        run: uv python install
        working-directory: docs

      - name: Install docs dependencies (uv sync)
        run: uv sync --all-extras --dev --locked || uv sync --all-extras --dev
        working-directory: docs

      - name: Build site with ProperDocs (via uv)
        run: uv run properdocs build --site-dir site
        working-directory: docs

      - name: Prepare authenticated push
        run: |
          # ensure we can push using the GITHUB_TOKEN
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Deploy with ProperDocs gh-deploy
        run: |
          # force-deploy the built site to gh-pages using ProperDocs
          uv run properdocs gh-deploy --force
        working-directory: docs
