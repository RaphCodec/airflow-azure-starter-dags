name: Deploy ProperDocs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv (astral) and enable cache
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.11.7'
          enable-cache: true

      - name: Install Python for the project (via uv)
        run: uv python install
        working-directory: docs

      - name: Install docs dependencies (uv sync)
        run: uv sync --all-extras --dev
        working-directory: docs

      - name: Build site with ProperDocs (via `uv`)
        run: uv run properdocs build --site-dir site
        working-directory: docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
