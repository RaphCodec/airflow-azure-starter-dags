name: Deploy ProperDocs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv (astral) and enable cache
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.11.7'
          enable-cache: true

      - name: Install Python for the project (via uv)
        run: uv python install
        working-directory: docs

      - name: Install docs dependencies (uv sync)
        run: uv sync --all-extras --dev
        working-directory: docs

      - name: Build site with ProperDocs (via `uv`)
        run: uv run properdocs build --site-dir site
        working-directory: docs

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/site
          destination_branch: gh-pages
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
